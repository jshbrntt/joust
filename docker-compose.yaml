services:
  env:
    build:
      args:
        - BUILDKIT_INLINE_CACHE
      cache_from:
        - ${IMAGE}
    environment:
      DEV: 1
    image: ${IMAGE}
    ports:
      - "${MAME_HTTP_PORT:-8000}:${MAME_HTTP_PORT:-8000}"
    user: ${DEV_USER}:${DEV_GROUP}
    working_dir: ${DEV_PATH}
    volumes:
      - ${PROJECT_PATH}:/${DEV_PATH}
